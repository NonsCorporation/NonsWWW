<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nons Snake</title>
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root{
      --color-nonsdarkbg:#101010;
      --color-nonswhitetext:#f9f9f9;
      --color-nonscontainerbg:#171717;
      --color-nonsprimary:#6768ab;
      --bg:var(--color-nonsdarkbg);
      --text:var(--color-nonswhitetext);
      --muted:rgba(255,255,255,0.65);
    }
    html,body{height:100%}
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background-color:var(--bg);
      color:var(--text);
      font-family:'Onest','Cormorant Garamond',Georgia,serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:2rem;
    }
    .card{
      width:min(92vw,560px);
      padding:2rem;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.04);
      box-shadow:0 12px 40px rgba(0,0,0,0.6);
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:1.25rem;
      animation:fadeUp .28s ease both;
    }
    .logo-container{
      width:68px;
      height:68px;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg, var(--color-nonsprimary), #8da0ff);
      padding:3px;
      box-shadow:0 8px 24px rgba(103,104,171,0.25);
    }
    .logo-container img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
    }
    h1{
      margin:0;
      font-size:clamp(1.8rem,4vw,2.4rem);
      font-weight:800;
      letter-spacing:-0.02em;
      color:var(--text);
      line-height:1.1;
    }
    .tagline{
      margin:0;
      color:var(--muted);
      font-size:1rem;
      line-height:1.5;
    }
    .game-shell{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:1rem;
      align-items:center;
      user-select:none;
      -webkit-user-select:none;
      -moz-user-select:none;
      -ms-user-select:none;
    }
    canvas{
      width:100%;
      max-width:560px;
      height:auto;
      border-radius:18px;
      background:#040404;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02);
      touch-action:none;
      -webkit-tap-highlight-color: transparent;
    }
    .info-row{
      width:100%;
      display:flex;
      justify-content:space-between;
      gap:1rem;
      color:var(--muted);
      font-size:0.95rem;
    }
    .info-row span{font-weight:700;color:var(--text)}
    .actions{
      width:100%;
      display:flex;
      justify-content:center;
      gap:1rem;
      flex-wrap:wrap;
    }
    .mobile-controls{
      width:100%;
      max-width:280px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      grid-template-rows:repeat(2, minmax(0, auto));
      gap:0.5rem;
      justify-items:center;
      align-items:center;
    }
    .direction-btn{
      width:72px;
      height:72px;
      border-radius:18px;
      border:0;
      color:var(--bg);
      background:linear-gradient(90deg,var(--color-nonsprimary),#8da0ff);
      font-weight:800;
      font-size:1.25rem;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(103,104,171,0.12);
      transition:transform .16s ease,box-shadow .16s ease,opacity .2s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      user-select:none;
      -webkit-user-select:none;
      -moz-user-select:none;
      -ms-user-select:none;
    }
    .direction-btn.placeholder{
      visibility:hidden;
      background:transparent;
      box-shadow:none;
      cursor:default;
    }
    .direction-btn:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(103,104,171,0.16)}
    .btn,
    button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:120px;
      padding:0.8rem 1.3rem;
      border-radius:999px;
      border:0;
      cursor:pointer;
      font-weight:700;
      text-decoration:none;
      color:var(--bg);
      background:linear-gradient(90deg,var(--color-nonsprimary),#8da0ff);
      box-shadow:0 8px 20px rgba(103,104,171,0.12);
      transition:transform .16s ease,box-shadow .16s ease,opacity .2s ease;
    }
    button:hover,.btn:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(103,104,171,0.16)}
    button:disabled{opacity:.6;cursor:default;transform:none;box-shadow:0 8px 20px rgba(103,104,171,0.08)}
    .hint{
      margin:0;
      color:var(--muted);
      font-size:0.92rem;
      line-height:1.5;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @media (max-width:640px){
      .card{padding:1.5rem;border-radius:14px}
      .logo-container{width:54px;height:54px}
      .mobile-controls{display:grid}
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="main-title">
    <div class="logo-container">
      <img src="./logo-circle-blackbg.png" alt="Nons logo">
    </div>
    <div>
      <h1 id="main-title">Snake</h1>
    </div>
    <div class="game-shell">
      <canvas id="snake-game" width="560" height="560" aria-label="Snake game board"></canvas>
      <div class="info-row">
        <div>Score: <span id="score">0</span></div>
        <div>Level: <span id="level">1</span></div>
      </div>
      <div class="actions">
        <button id="restart" type="button">Restart</button>
        <a href="./index.html" class="btn">Back</a>
      </div>
      <div class="mobile-controls" aria-label="Snake mobile controls">
        <button class="direction-btn placeholder" type="button" aria-hidden="true"></button>
        <button class="direction-btn" data-x="0" data-y="-1" type="button" aria-label="Move up">↑</button>
        <button class="direction-btn placeholder" type="button" aria-hidden="true"></button>
        <button class="direction-btn" data-x="-1" data-y="0" type="button" aria-label="Move left">←</button>
        <button class="direction-btn" data-x="0" data-y="1" type="button" aria-label="Move down">↓</button>
        <button class="direction-btn" data-x="1" data-y="0" type="button" aria-label="Move right">→</button>
      </div>
      <p class="hint">Use arrow keys, WASD, or the on-screen controls to move.</p>
    </div>
  </main>
  <script>
    const canvas = document.getElementById('snake-game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const restartButton = document.getElementById('restart');
    const gridSize = 20;
    const tileSize = 28;
    const boardSize = gridSize * tileSize;
    let snake = [];
    let direction = { x: 0, y: 0 };
    let nextDirection = { x: 0, y: 0 };
    let apple = { x: 0, y: 0 };
    let score = 0;
    let level = 1;
    let speed = 8;
    let lastFrameTime = 0;
    let gameOver = false;

    function randomPosition() {
      return {
        x: Math.floor(Math.random() * gridSize),
        y: Math.floor(Math.random() * gridSize),
      };
    }

    function placeApple() {
      let position;
      const collision = () => snake.some(segment => segment.x === position.x && segment.y === position.y);
      do {
        position = randomPosition();
      } while (collision());
      apple = position;
    }

    function resetGame() {
      snake = [ { x: 10, y: 10 } ];
      direction = { x: 0, y: 0 };
      nextDirection = { x: 0, y: 0 };
      score = 0;
      level = 1;
      speed = 8;
      gameOver = false;
      scoreEl.textContent = score;
      levelEl.textContent = level;
      placeApple();
      draw();
    }

    function draw() {
      ctx.fillStyle = '#040404';
      ctx.fillRect(0, 0, boardSize, boardSize);

      ctx.fillStyle = '#ffffff14';
      for (let x = 0; x < gridSize; x += 1) {
        ctx.fillRect(x * tileSize, 0, 1, boardSize);
      }
      for (let y = 0; y < gridSize; y += 1) {
        ctx.fillRect(0, y * tileSize, boardSize, 1);
      }

      ctx.fillStyle = '#ff3b3b';
      ctx.fillRect(apple.x * tileSize + 3, apple.y * tileSize + 3, tileSize - 6, tileSize - 6);

      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? '#f8f8f8' : '#8da0ff';
        ctx.fillRect(segment.x * tileSize + 2, segment.y * tileSize + 2, tileSize - 4, tileSize - 4);
      });

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, boardSize, boardSize);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 30px Onest, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', boardSize / 2, boardSize / 2 - 10);
        ctx.font = '16px Onest, system-ui, sans-serif';
        ctx.fillText('Press Restart to try again', boardSize / 2, boardSize / 2 + 24);
      }
    }

    function update() {
      if (gameOver) return;
      if (nextDirection.x === -direction.x && nextDirection.y === -direction.y) {
        // prevent reversing directly
      } else {
        direction = nextDirection.x === 0 && nextDirection.y === 0 ? direction : nextDirection;
      }
      if (direction.x === 0 && direction.y === 0) {
        draw();
        return;
      }

      const head = {
        x: (snake[0].x + direction.x + gridSize) % gridSize,
        y: (snake[0].y + direction.y + gridSize) % gridSize,
      };

      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver = true;
        draw();
        return;
      }

      snake.unshift(head);

      if (head.x === apple.x && head.y === apple.y) {
        score += 1;
        if (score % 5 === 0) {
          level += 1;
          speed = Math.min(16, speed + 1);
          levelEl.textContent = level;
        }
        scoreEl.textContent = score;
        placeApple();
      } else {
        snake.pop();
      }

      draw();
    }

    function loop(timestamp) {
      requestAnimationFrame(loop);
      if (timestamp - lastFrameTime < 1000 / speed) return;
      lastFrameTime = timestamp;
      update();
    }

    function setDirection(x, y) {
      nextDirection = { x, y };
    }

    document.addEventListener('keydown', (event) => {
      if (gameOver && event.key === 'Enter') {
        resetGame();
        return;
      }
      switch (event.key) {
        case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
        case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
      }
    });

    const controlButtons = document.querySelectorAll('.direction-btn');
    controlButtons.forEach((button) => {
      const x = Number(button.getAttribute('data-x'));
      const y = Number(button.getAttribute('data-y'));

      const handleControl = (event) => {
        event.preventDefault();
        setDirection(x, y);
      };

      button.addEventListener('click', handleControl);
      button.addEventListener('touchstart', handleControl, { passive: false });
    });

    canvas.addEventListener('touchstart', (event) => {
      event.preventDefault();
    }, { passive: false });

    restartButton.addEventListener('click', resetGame);
    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
