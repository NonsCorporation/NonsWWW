<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The reasonable social media" />
  <meta property="og:title" content="Nons :: Soon" />
  <meta property="og:description" content="The reasonable social media" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://nonsapp.com/ogimage.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nons :: Soon" />
  <meta property="og:url" content="https://nonsapp.com" />
  <meta name="twitter:description" content="The reasonable social media" />
  <meta name="twitter:image" content="https://nonsapp.com/ogimage.png" />
  <title>Nons :: Soon</title>
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root{
      --color-nonsdarkbg:#101010;
      --color-nonswhitetext:#f9f9f9;
      --color-nonscontainerbg:#171717;
      --color-nonsprimary:#6768ab;
      --bg:var(--color-nonsdarkbg);
      --text:var(--color-nonswhitetext);
      --muted:rgba(255,255,255,0.65);
    }
    html,body{height:100%}
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background-color:var(--bg);
      color:var(--text);
      font-family:'Onest','Cormorant Garamond',Georgia,serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:2rem;
    }
    .card{
      width:min(92vw,480px);
      padding:3rem;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.04);
      box-shadow:0 12px 40px rgba(0,0,0,0.6);
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:1.5rem;
      animation:fadeUp .28s ease both;
    }
    .logo-container{
      width:80px;
      height:80px;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg, var(--color-nonsprimary), #8da0ff);
      padding:3px;
      box-shadow:0 8px 24px rgba(103,104,171,0.25);
    }
    .logo-container img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
    }
    .brand{
      display:inline-block;
      padding:0.22rem 0.6rem;
      border-radius:999px;
      font-weight:700;
      font-size:0.82rem;
      color:var(--bg);
      background:linear-gradient(90deg,var(--color-nonsprimary),#8da0ff);
      margin-bottom:0.4rem;
    }
    h1{
      margin:0;
      font-size:clamp(1.6rem,4vw,2.2rem);
      font-weight:800;
      letter-spacing:-0.02em;
      color:var(--text);
      line-height:1.2;
    }
    .tagline{
      margin:0;
      color:var(--muted);
      font-size:1.1rem;
      line-height:1.45;
    }
    .btn{
      background:linear-gradient(90deg,var(--color-nonsprimary),#8da0ff);
      color:var(--bg);
      border:0;
      padding:0.72rem 1.5rem;
      border-radius:999px;
      cursor:pointer;
      font-weight:700;
      font-size:0.95rem;
      box-shadow:0 8px 20px rgba(103,104,171,0.12);
      transition:transform .16s ease,box-shadow .16s ease;
      text-decoration:none;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(103,104,171,0.16)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @media (max-width:640px){.card{padding:2rem;border-radius:14px}.logo-container{width:64px;height:64px}}
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="main-title">
    <div class="logo-container">
      <img src="./logo-circle-blackbg.png" alt="Nons logo">
    </div>
    <div>
      <h1 id="main-title">Nons</h1>
      <p class="tagline">the reasonable social media</p>
    </div>
    <span class="btn">Coming Soon</span>
  </main>
</body>
</html>
